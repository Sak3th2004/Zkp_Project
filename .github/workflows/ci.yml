name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy api/ zkp_engine/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zkproofapi_test
          POSTGRES_USER: zkp
          POSTGRES_PASSWORD: zkp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zkp -d zkproofapi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://zkp:zkp@localhost:5432/zkproofapi_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-64-chars-long-for-ci-testing-purposes-only-ok
          JWT_SECRET: test-jwt-secret-64-chars-long-for-ci-testing-purposes-only-ok
          APP_ENV: testing
        run: pytest --cov=api --cov=zkp_engine --cov-report=xml -v

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t zkproofapi:latest .

      - name: Smoke test
        run: |
          docker run -d --name zkp-test -p 8000:8000 \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -e APP_ENV=testing \
            zkproofapi:latest || true
          sleep 5
          docker logs zkp-test || true
          docker stop zkp-test || true
          docker rm zkp-test || true
